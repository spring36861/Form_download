    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
        }
        .header-banner {
            background-color: #0056b3;
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        /* 強化分類標題的視覺，使其不與檔案清單混淆 */
        .accordion-button {
            background-color: #e9ecef;
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
        }
        .accordion-button:not(.collapsed) {
            background-color: #cfe2ff;
            color: #0c63e4;
            font-weight: bold;
        }
        .file-list-group .list-group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
        }
        .file-list-group .list-group-item:hover {
            background-color: #f1f8ff;
        }
        /* 確保按鈕區塊不換行 */
        .action-buttons {
            white-space: nowrap;
        }
        .action-buttons .btn {
            min-width: 70px;
        }
    </style>
</head>

            <li class="nav-item" role="presentation">
                <button class="nav-link fs-5 fw-bold" id="machine-tab" data-bs-toggle="tab" data-bs-target="#machine-pane" type="button" role="tab" aria-controls="machine-pane" aria-selected="false">
                    危險性機械 (Machinery)
                </button>
            </li>
        </ul>

        <div class="tab-content" id="formTabsContent">

            </div>

        // --- 渲染畫面邏輯 ---

        function renderAccordion(dataObj, containerId, folderName) {
            const container = document.getElementById(containerId);
            let htmlContent = "";
            let index = 0;

            for (const [category, files] of Object.entries(dataObj)) {
                // 為每個分類產生唯一的 ID
                const headingId = `heading-${folderName}-${index}`;
                const collapseId = `collapse-${folderName}-${index}`;
                
                // 產生清單項目
                let listHtml = '<ul class="list-group list-group-flush file-list-group">';
                files.forEach(fileName => {
                    // 使用相對路徑指向 GitHub 上的實體檔案位置
                    const filePath = `./${folderName}/${encodeURIComponent(fileName)}`;
                    listHtml += `
                        <li class="list-group-item py-3">
                            <span class="text-dark">${fileName}</span>
                            <div class="action-buttons">
                                <a href="${filePath}" target="_blank" class="btn btn-outline-secondary btn-sm me-2">開啟</a>
                                <a href="${filePath}" download="${fileName}" class="btn btn-primary btn-sm">下載</a>
                            </div>
                        </li>
                    `;
                });
                listHtml += '</ul>';

                // 全部預設收合
                const buttonClass = "accordion-button collapsed";
                const collapseClass = "accordion-collapse collapse";
                const isExpanded = "false";

                htmlContent += `
                    <div class="accordion-item">
                        <h2 class="accordion-header" id="${headingId}">
                            <button class="${buttonClass}" type="button" data-bs-toggle="collapse" data-bs-target="#${collapseId}" aria-expanded="${isExpanded}" aria-controls="${collapseId}">
                                ${category} <span class="badge bg-secondary ms-2">${files.length}</span>
                            </button>
                        </h2>
                        <div id="${collapseId}" class="${collapseClass}" aria-labelledby="${headingId}" data-bs-parent="#${containerId}">
                            <div class="accordion-body p-0">
                                ${listHtml}
                            </div>
                        </div>
                    </div>
                `;
                index++;
            }
            container.innerHTML = htmlContent;
        }

        // 初始化渲染
        renderAccordion(equipmentData, "accordionEquipment", "equipment");
        renderAccordion(machineData, "accordionMachine", "machine");
