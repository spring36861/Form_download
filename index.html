<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中華產業機械設備協會 - 表單下載中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
        }
        .header-banner {
            background-color: #0056b3;
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .search-box {
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 8px;
            border: 2px solid #cfe2ff;
        }
        .search-box:focus {
            border-color: #0c63e4;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .accordion-button {
            background-color: #e9ecef;
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
        }
        .accordion-button:not(.collapsed) {
            background-color: #cfe2ff;
            color: #0c63e4;
            font-weight: bold;
        }
        .file-list-group .list-group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
        }
        .file-list-group .list-group-item:hover {
            background-color: #f1f8ff;
        }
        .action-buttons {
            white-space: nowrap;
        }
        .action-buttons .btn {
            min-width: 70px;
        }
    </style>
</head>
<body>

    <header class="header-banner">
        <div class="container">
            <h1 class="display-5 fw-bold">中華產業機械設備協會</h1>
            <p class="lead mb-0">危險性機械及設備 表單下載中心</p>
        </div>
    </header>

    <main class="container mb-5">
        
        <div id="line-warning" class="alert alert-danger shadow-sm mb-4" style="display: none;" role="alert">
            <h5 class="alert-heading fw-bold">⚠️ 無法下載檔案？</h5>
            <p class="mb-0">系統偵測到您正使用 LINE 內建瀏覽器，這會導致檔案無法順利下載。</p>
            <hr>
            <p class="mb-0">👉 請點擊右上角的 <strong>「⋮」或「...」</strong> 圖示，並選擇 <strong>「以其他應用程式開啟」</strong> 或 <strong>「用預設瀏覽器開啟」</strong>（例如 Chrome 或 Safari），即可正常下載與預覽。</p>
        </div>

        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <input type="search" id="searchInput" class="form-control form-control-lg search-box py-3" placeholder="🔍 快速搜尋表單名稱 (例如: 定期檢查, 明細表...)">
            </div>
        </div>

        <ul class="nav nav-tabs nav-fill mb-4" id="formTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fs-5 fw-bold" id="equipment-tab" data-bs-toggle="tab" data-bs-target="#equipment-pane" type="button" role="tab" aria-controls="equipment-pane" aria-selected="true">
                    危險性設備 (Equipment)
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fs-5 fw-bold" id="machine-tab" data-bs-toggle="tab" data-bs-target="#machine-pane" type="button" role="tab" aria-controls="machine-pane" aria-selected="false">
                    危險性機械 (Machinery)
                </button>
            </li>
        </ul>

        <div class="tab-content" id="formTabsContent">
            <div class="tab-pane fade show active" id="equipment-pane" role="tabpanel" aria-labelledby="equipment-tab" tabindex="0">
                <div class="accordion" id="accordionEquipment"></div>
            </div>
            <div class="tab-pane fade" id="machine-pane" role="tabpanel" aria-labelledby="machine-tab" tabindex="0">
                <div class="accordion" id="accordionMachine"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // --- 1. 偵測 LINE 內建瀏覽器 ---

        if (userAgent.indexOf("Line") > -1) {
            document.getElementById("line-warning").style.display = "block";
        }

        // --- 2. 資料設定區 ---

            ],
            "其他": [

        };

        const machineData = {
            "申請書": [
                "危險性機械檢查申請書.doc",
                "危險性機械及設備廢用申請書(中區職業安全衛生中心).doc",
                "變更備查申請書104.02.09.doc",
                "檢查退費申請書 _1130523.docx",
                "線上申請檢查作業申請書.doc",
                "收據補發申請書.doc",
                "新費率補換發申請書.doc",
                "危險性機械或設備檢查結果報告表補發申請書.doc",
                "危險性機械及設備代檢機構網站線上會員申請表.docx"
            ],
            "檢附資料一覽表": [
                "營建用升降機申請竣工檢查檢附資料一覽表.doc",
                "既有危險性機械申請檢查檢附資料一覽表(P3-61-04D).doc",

            ],

                "固定式起重機明細表.doc",
                "移動式起重機明細表.doc",
                "營建用升降機明細表(P3-61-50B).doc"
            ],
            "自行檢查紀錄表": [
                "吊籠自行檢查紀錄.doc",

            ],
            "自動檢查表": [
                "吊籠每日作業前檢點表107.doc",
                "吊籠每月定期檢查紀錄表.doc",
                "固定式起重機每日作業前檢點表107.doc",
                "固定式起重機每月自動檢查紀錄表107.doc",
                "固定式起重機每年自動檢查紀錄表107.doc",
                "移動式起重機每日作業前檢點表107.doc",
                "移動式起重機每月自動檢查紀錄表107.doc",
                "移動式起重機每年自動檢查紀錄表107.doc"
            ],
            "其他": [
                "拓印紀錄_機械.docx",
                "危險性機械修補作業結果記錄表(修)1040225.doc",
                "危險性機械或設備異動報備書 .doc",
                "危險性機械或設備申請檢查代辦委託書112.04版.docx",
                "檢查日期變更回單.doc",
                "變更檢查地址回單.doc"
            ]
        };

        // --- 3. 渲染畫面與 PDF/Word 判斷邏輯 (已改用 Google 檢視器) ---

        function renderAccordion(dataObj, containerId, folderName) {
            const container = document.getElementById(containerId);
            let htmlContent = "";
            let index = 0;

            const baseUrl = window.location.href.split('?')[0].split('#')[0].replace(/\/[^\/]*$/, '');

            for (const [category, files] of Object.entries(dataObj)) {
                const headingId = `heading-${folderName}-${index}`;
                const collapseId = `collapse-${folderName}-${index}`;
                
                let listHtml = `<ul class="list-group list-group-flush file-list-group" id="list-${folderName}-${index}">`;
                files.forEach(fileName => {
                    const relativeFilePath = `./${folderName}/${encodeURIComponent(fileName)}`;
                    const absoluteFilePath = `${baseUrl}/${folderName}/${encodeURIComponent(fileName)}`;
                    
                    let previewUrl = "";
                    const lowerName = fileName.toLowerCase();
                    
                    // 判斷檔案類型決定預覽方式
                    if (lowerName.endsWith('.pdf')) {
                        // PDF 檔：直接使用瀏覽器原生開啟
                        previewUrl = relativeFilePath;
                    } else if (lowerName.endsWith('.doc') || lowerName.endsWith('.docx')) {
                        // Word 檔：改用 Google Docs 線上檢視器 (移除 embedded 參數以獲得最佳滿版體驗)
                        previewUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(absoluteFilePath)}`;
                    } else {
                        previewUrl = relativeFilePath; // 預設處理
                    }

                    listHtml += `
                        <li class="list-group-item py-3 file-item">
                            <span class="text-dark file-name">${fileName}</span>
                            <div class="action-buttons">
                                <a href="${previewUrl}" target="_blank" class="btn btn-outline-secondary btn-sm me-2" title="線上預覽文件">開啟</a>
                                <a href="${relativeFilePath}" download="${fileName}" class="btn btn-primary btn-sm">下載</a>
                            </div>
                        </li>
                    `;
                });
                listHtml += '</ul>';

                htmlContent += `
                    <div class="accordion-item category-item">
                        <h2 class="accordion-header" id="${headingId}">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#${collapseId}" aria-expanded="false" aria-controls="${collapseId}">
                                ${category} <span class="badge bg-secondary ms-2 file-count">${files.length}</span>
                            </button>
                        </h2>
                        <div id="${collapseId}" class="accordion-collapse collapse" aria-labelledby="${headingId}">
                            <div class="accordion-body p-0">
                                ${listHtml}
                            </div>
                        </div>
                    </div>
                `;
                index++;
            }
            container.innerHTML = htmlContent;
        }

        renderAccordion(equipmentData, "accordionEquipment", "equipment");
        renderAccordion(machineData, "accordionMachine", "machine");

        // 搜尋列過濾邏輯
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.trim().toLowerCase();
            const allCategories = document.querySelectorAll('.category-item');

            allCategories.forEach(category => {
                let visibleCount = 0;
                const fileItems = category.querySelectorAll('.file-item');
                
                fileItems.forEach(item => {
                    const fileName = item.querySelector('.file-name').textContent.toLowerCase();
                    if (fileName.includes(keyword)) {
                        item.style.setProperty('display', 'flex', 'important');
                        visibleCount++;
                    } else {
                        item.style.setProperty('display', 'none', 'important');
                    }
                });

                category.querySelector('.file-count').textContent = visibleCount;

                const collapseDiv = category.querySelector('.accordion-collapse');
                const bsCollapse = bootstrap.Collapse.getInstance(collapseDiv) || new bootstrap.Collapse(collapseDiv, {toggle: false});

                if (visibleCount > 0) {
                    category.style.display = 'block';
                    if (keyword !== "") {
                        bsCollapse.show();
                    } else {
                        bsCollapse.hide();
                    }
                } else {
                    category.style.display = 'none';
                    bsCollapse.hide();
                }
            });
        });

    </script>
</body>
</html>
